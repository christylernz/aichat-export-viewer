<!--
  linkItem.html

  This template has three mutually exclusive display blocks:
    1. full-detail  — image + title + description + message + site name
    2. short-links  — just the title as a link
    3. cards        — image-first card layout

  The active block is chosen by the isFullDetail / isShortLinks / isCards
  getters in linkItem.js, which read the `displayType` @api prop passed
  down from linkGroup.

  The draggable="true" attribute on the outer div is what opts this element
  into the HTML5 Drag and Drop API. Without it, no drag events fire.

  data-link-id is a convenience attribute for debugging — open DevTools and
  inspect any item to see which link ID it represents.
-->
<template>
  <div
    class={itemClass}
    draggable="true"
    data-link-id={link.id}
    ondragstart={handleDragStart}
    ondragend={handleDragEnd}
  >

    <!-- ── FULL DETAIL ─────────────────────────────────────────────── -->
    <template lwc:if={isFullDetail}>
      <div class="slds-media slds-media_center slds-has-flexi-truncate full-detail-layout">

        <!-- OG thumbnail (optional) -->
        <template lwc:if={hasImage}>
          <div class="slds-media__figure">
            <img src={link.image} alt="" class="og-thumbnail" />
          </div>
        </template>

        <!-- Text content -->
        <div class="slds-media__body">
          <p class="slds-text-heading_small link-title">
            <a href={link.url} target="_blank" rel="noopener noreferrer">
              {link.title}
            </a>
          </p>

          <template lwc:if={hasDescription}>
            <p class="slds-text-body_small slds-text-color_weak link-description">
              {link.description}
            </p>
          </template>

          <template lwc:if={hasMessage}>
            <p class="slds-text-body_small link-message">
              &ldquo;{link.message}&rdquo;
            </p>
          </template>

          <p class="slds-text-body_small slds-text-color_weak link-site">
            {link.siteName}
          </p>
        </div>

        <!-- Controls: drag handle + remove -->
        <div class="slds-no-flex item-controls">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <button
            class="slds-button slds-button_icon remove-btn"
            onclick={handleRemove}
            title="Remove link"
          >✕</button>
        </div>

      </div>
    </template>

    <!-- ── SHORT LINKS ────────────────────────────────────────────── -->
    <template lwc:elseif={isShortLinks}>
      <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center short-link-layout">
        <span class="drag-handle slds-m-right_x-small" title="Drag to reorder">⠿</span>
        <a
          href={link.url}
          target="_blank"
          rel="noopener noreferrer"
          class="slds-text-link slds-truncate"
        >
          {link.title}
        </a>
        <button
          class="slds-button slds-button_icon remove-btn slds-m-left_x-small"
          onclick={handleRemove}
          title="Remove link"
        >✕</button>
      </div>
    </template>

    <!-- ── CARDS ──────────────────────────────────────────────────── -->
    <template lwc:elseif={isCards}>
      <div class="card-layout">
        <template lwc:if={hasImage}>
          <img src={link.image} alt="" class="card-image" />
        </template>
        <div class="card-body">
          <p class="slds-text-heading_small link-title">
            <a href={link.url} target="_blank" rel="noopener noreferrer">
              {link.title}
            </a>
          </p>
          <template lwc:if={hasDescription}>
            <p class="slds-text-body_small slds-text-color_weak">
              {link.description}
            </p>
          </template>
        </div>
        <div class="card-controls">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <button
            class="slds-button slds-button_icon remove-btn"
            onclick={handleRemove}
            title="Remove link"
          >✕</button>
        </div>
      </div>
    </template>

  </div>
</template>
